name: MediaplanMobile
options:
  bundleIdPrefix: com.mediaplan
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: 2.18.0

targets:
  MediaplanMobile:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: MediaplanMobile
    resources:
      - MediaplanMobile/Secrets.plist
    dependencies:
      - package: Supabase
        product: Supabase
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        PRODUCT_BUNDLE_IDENTIFIER: com.mediaplan.mobile
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Медиапланирование
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0.0
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "5.0"
